<div class="page-header">
  <h2>Kategori Yönetimi</h2>
  <button class="btn btn-primary btn-sm" (click)="toggleShowForm()">+ Kategori Ekle</button>
</div>

@if (showForm()) {
<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="grid-2" style="gap:12px">
      <div class="form-group">
        <label class="form-label">Kategori Adı</label>
        <input formControlName="name" class="form-input" />
      </div>
      <div class="form-group">
        <label class="form-label">Slug</label>
        <input formControlName="slug" class="form-input" />
      </div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="form-label">Açıklama</label>
      <textarea formControlName="description" class="form-input" rows="2"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="saving()">Kaydet</button>
      <button type="button" class="btn btn-ghost btn-sm" (click)="showForm.set(false)">İptal</button>
    </div>
  </form>
</div>
}

@if (loading()) {
@for (i of [1,2,3]; track i) {
<div class="skeleton" style="height:52px;border-radius:var(--radius-md);margin-bottom:8px"></div>
}
} @else {
<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Ad</th>
        <th>Slug</th>
        <th>Durum</th>
      </tr>
    </thead>
    <tbody>
      @for (c of categories(); track c.id) {
      <tr>
        <td class="text-dim text-sm">#{{ c.id }}</td>
        <td style="font-size:13px;font-weight:500">{{ c.name }}</td>
        <td class="text-muted text-sm">{{ c.slug }}</td>
        <td>
          <span class="badge" [class]="c.isActive ? 'badge-success' : 'badge-muted'">
            {{ c.isActive ? 'Aktif' : 'Pasif' }}
          </span>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
}
