<div class="auth-center">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon-wrap">🔐</div>
      <h1>Yeni Şifre Belirle</h1>
      <p>Güçlü bir şifre seçin.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Yeni Şifre</label>
        <input formControlName="password" type="password" class="form-input"
          [class.error]="showError('password')" placeholder="En az 8 karakter" />
        @if (showError('password')) {
          <span class="form-error">Şifre en az 8 karakter olmalıdır.</span>
        }
      </div>
      <div class="form-group" style="margin-top:12px">
        <label class="form-label">Şifre Tekrar</label>
        <input formControlName="confirmPassword" type="password" class="form-input"
          [class.error]="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched"
          placeholder="Şifrenizi tekrar girin" />
        @if (form.errors?.['mismatch'] && form.get('confirmPassword')?.touched) {
          <span class="form-error">Şifreler eşleşmiyor.</span>
        }
      </div>
      @if (serverError()) {
        <div class="server-error">{{ serverError() }}</div>
      }
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:20px" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> }
        Şifreyi Güncelle
      </button>
    </form>
  </div>
</div>
