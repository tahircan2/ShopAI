spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 50

app:
  cookie:
    secure: true

server:
  port: 8080
  ssl:
    enabled: false  # SSL termination yapıyorsa reverse proxy (nginx) konfigüre et

springdoc:
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.shopai: WARN
    root: ERROR
