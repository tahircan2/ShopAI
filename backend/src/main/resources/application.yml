spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:mysql://localhost:3306/shopai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: shopai_user
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 6
    out-of-order: true
    clean-disabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 3600000       # 1 saat (ms)
    refresh-expiration: 604800000   # 7 gün (ms)

  cookie:
    secure: false     # Dev: false, Prod: true (HTTPS gerektirir)
    same-site: Strict
    domain: ${COOKIE_DOMAIN:localhost}

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    internal-key: ${AI_INTERNAL_KEY}

  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

  security:
    max-failed-attempts: 5
    lockout-duration-minutes: 15
    password-reset-expiry-hours: 2
    email-verify-expiry-hours: 24

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: true   # Prod'da false yapılmalı

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.shopai: INFO
    org.springframework.security: DEBUG
    org.springframework.security.web.csrf: TRACE
    org.hibernate.SQL: WARN
