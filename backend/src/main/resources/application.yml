spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/shopai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:shopai_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 6
    out-of-order: false
    clean-disabled: true   # IMPORTANT: never allow Flyway to wipe the database
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  data:
    web:
      pageable:
        serialization-mode: via-dto

server:
  port: 8080
  # Trust X-Forwarded-For only when Spring itself parses it (prevents IP spoofing)
  forward-headers-strategy: FRAMEWORK
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 900000        # 15 dakika (ms) — güvenlik standardı
    refresh-expiration: 604800000   # 7 gün (ms)

  cookie:
    secure: false     # Dev: false, Prod: true (HTTPS gerektirir)
    same-site: Strict
    domain: ${COOKIE_DOMAIN:}  # Güvenlik Loglaması (0 Maliyet) - 500 Hataları için Webhook
  webhook:
    whatsapp:
      phone: ""   # Örnek: +905551234567
      apikey: ""  # CallMeBot'tan alacağınız API Key

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    internal-key: ${AI_INTERNAL_KEY}

  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

  security:
    max-failed-attempts: 5
    lockout-duration-minutes: 15
    password-reset-expiry-hours: 2
    email-verify-expiry-hours: 24

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: true   # Prod'da false yapılmalı

management:
  observations:
    http:
      server:
        requests:
          enabled: false
    security:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.shopai: INFO
    # Güvenlik logları sadece yerel debug amacıyla:
    # org.springframework.security: DEBUG
    # org.springframework.security.web.csrf: TRACE
    org.hibernate.SQL: WARN

# ─── Typesense Arama Motoru ──────────────────────────────────────────────────
typesense:
  enabled: true
  protocol: http
  host: ${TYPESENSE_HOST:localhost}
  port: ${TYPESENSE_PORT:8108}
  api-key: ${TYPESENSE_API_KEY}
  connection-timeout-seconds: 5
