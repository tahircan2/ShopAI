# ShopAI — Professional Docker Orchestration
# ------------------------------------------------------------------------------
# Includes: Backend (Java 21), Frontend (Angular 19), AI Service (Python 3.12),
# Database (MySQL 8), Search (Typesense), and Cache (Redis).

services:
  # ─── Database: MySQL 8 ──────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    command: --log-bin-trust-function-creators=1
    container_name: shopai-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shopai
      MYSQL_USER: shopai_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-Tahir682!}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - shopai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache: Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: shopai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shopai-network

  # ─── Search: Typesense ──────────────────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: shopai-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-shopai-typesense-key-2024}
      --enable-cors
    networks:
      - shopai-network

  # ─── AI Service: Python 3.12 ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: shopai-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      - SPRING_BOOT_BASE_URL=http://backend:8080/api
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    networks:
      - shopai-network
    depends_on:
      redis:
        condition: service_started

  # ─── Backend: Spring Boot (Java 21) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_USERNAME=shopai_user
      - DB_PASSWORD=${DB_PASSWORD:-Tahir682!}
      - TYPESENSE_HOST=typesense
      - AI_SERVICE_URL=http://ai-service:8000
      - APP_FRONTEND_URL=http://localhost
      - COOKIE_DOMAIN=localhost
    ports:
      - "8080:8080"
    networks:
      - shopai-network
    depends_on:
      db:
        condition: service_healthy
      typesense:
        condition: service_started
      ai-service:
        condition: service_started

  # ─── Frontend: Angular 19 (Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - shopai-network
    depends_on:
      - backend

networks:
  shopai-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
